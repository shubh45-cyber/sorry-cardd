<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry ❤️</title>
    <style>
        :root {
            --primary-pink: #ffafbd;
            --deep-rose: #ffc3a0;
            --text-color: #5d5d5d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-pink), var(--deep-rose));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #main-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            transition: all 0.5s ease;
        }

        h1 { color: #d63384; margin-bottom: 30px; }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #no-btn { background-color: #2ecc71; color: white; }
        #yes-btn { 
            background-color: #e74c3c; 
            color: white; 
            position: absolute;
            left: 55%;
        }

        .hidden { display: none; }

        #sorry-card {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .show-card {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .message {
            line-height: 1.6;
            color: var(--text-color);
            font-size: 18px;
        }

        .cat-container {
            font-size: 50px;
            margin-top: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="question-section">
            <h1 id="question-text">Are you still mad at me? 🥺</h1>
            <div class="btn-container">
                <button id="no-btn" onclick="showLove()">No</button>
                <button id="yes-btn" onmouseover="moveButton()" onclick="moveButton()">Yes</button>
            </div>
        </div>

        <div id="sorry-card" class="hidden">
            <h1>I'm so sorry duldul ... 🌹</h1>
            <p class="message">
                I know I can be a lot to handle and I probably annoy you way more than I should. 
                But the truth is, <strong>I can't live without you.</strong> 
                You're my favorite person, and I promise to try harder. 
                Please forgive me?
            </p>
            <div class="cat-container">
                🫂🐱🐾
                <div style="font-size: 14px;">(Infinite Hugs)</div>
            </div>
        </div>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('yes-btn');
            // Randomly move the button within a 200px range
            const x = Math.random() * 200 - 100;
            const y = Math.random() * 200 - 100;
            
            btn.style.transform = `translate(${x}px, ${y}px)`;
        }

        function showLove() {
            document.getElementById('question-section').classList.add('hidden');
            const card = document.getElementById('sorry-card');
            card.classList.remove('hidden');
            // Small delay to trigger the CSS transition
            setTimeout(() => {
                card.classList.add('show-card');
            }, 50);
        }
    </script>
</body>
</html>
